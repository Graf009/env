- defaults:
    link:
        relink: true

- clean: ['~']


- create:
    - ~/.config
    - ~/.config/bat
    - ~/Library/Application Support/Code/User
    - ~/.config/fish
    - ~/.config/git/
    - ~/.config/pnpm
    - ~/.config/mise
    - ~/.claude

- link:
    ~/Library/Application Support/Code/User/settings.json: vscode.json
    ~/.config/bat/config: batconfig
    ~/.config/fish/config.fish: fish/config.fish
    ~/.config/fish/conf.d: fish/conf.d
    ~/.config/fish/graf009: fish/graf009
    ~/.config/gh: gh
    ~/.config/git/ignore: gitignore
    ~/.config/git/allowed_signers: git/allowed_signers
    ~/.config/kitty: kitty
    ~/.config/starship.toml: starship.toml
    ~/.editorconfig: editorconfig
    ~/.gitconfig-podeli: gitconfig-podeli
    ~/.gitconfig-public: gitconfig-public
    ~/.gitconfig: gitconfig
    ~/.config/ripgreprc: ripgreprc
    ~/.ssh/config: sshconfig
    ~/.config/pnpm/config.yaml: pnpm/config.yaml
    ~/.config/mise/config.toml: mise/config.toml
    ~/.config/fish/functions: fish/functions
    ~/.claude/settings.json: claude/settings.json
    ~/bin: bin

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [./install-brew-stuff.sh, Installing Homebrew]
    - [brew bundle install, Installing packages from Brewfile]
    - [./macos-defaults.sh, Applying macOS defaults]
    - [fish -c 'curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher update', Installing fisher plugins]
    - [fish -c 'mise install', Installing mise runtimes]