- defaults:
    link:
        relink: true

- clean: ['~']


- create:
    - ~/.config
    - ~/.config/bat
    - ~/.config/Code/User
    - ~/.config/fish
    - ~/.config/git/

- link:
    ~/.config/Code/User/settings.json: vscode.json
    ~/.config/bat/config: batconfig
    ~/.config/fish/config.fish: fish/config.fish
    ~/.config/fish/conf.d: fish/conf.d
    ~/.config/fish/graf009: fish/graf009
    ~/.config/gh: gh
    ~/.config/git/ignore: gitignore
    ~/.config/kitty: kitty
    ~/.config/starship.toml: starship.toml
    ~/.editorconfig: editorconfig
    ~/.gitconfig-podeli: gitconfig-podeli
    ~/.gitconfig-public: gitconfig-public
    ~/.gitconfig: gitconfig
    ~/.config/ripgreprc: ripgreprc

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - mkdir -p ~/bin
    - [./install-brew-stuff.sh, Installing homebrew and essential utils]