---
  - name: Ensure my productivity tools are installed
    homebrew_cask:
      name:
        - alfred
        - spotify
        - zoom
        - vlc
        - yandex

  - name: Reduce macos noise
    osx_defaults:
      key: "{{ item.key }}"
      domain: "{{ item.domain }}"
      value: "{{ item.value }}"
    loop:
      - domain: com.apple.dock
        key: no-bouncing
        value: TRUE